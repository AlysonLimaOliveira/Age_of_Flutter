name: age_of_flutter
description: "Um jogo de quiz sobre Flutter com temática de RPG medieval."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Ícones padrão do iOS (opcional, mas bom ter)
  cupertino_icons: ^1.0.2
  # Recomendado para temas medievais:
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
